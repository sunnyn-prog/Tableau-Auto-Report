name: Sync Tableau to Firebase

on:
  schedule:
    # Runs every 2 hours from 7:30 AM SGT to 9:30 PM SGT
    # SGT is UTC+8, so 7:30 AM SGT = 23:30 UTC, etc.
    - cron: '30 1,3,5,7,9,11,13,23 * * *'
  workflow_dispatch: # Allows manual trigger

jobs:
  sync_data:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt

    - name: Run sync script
      env:
        TABLEAU_TOKEN_NAME: "Sunny-FNP_1"
        TABLEAU_TOKEN_VALUE: ${{ secrets.TABLEAU_TOKEN_VALUE }}
        FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_CREDENTIALS }}
      run: |
        python backend/pull_tableau_tbp.py
