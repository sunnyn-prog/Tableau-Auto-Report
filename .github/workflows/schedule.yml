name: Pull Tableau Data

on:
  schedule:
    # 7:30 AM SG Time
    - cron: '30 23 * * *'
    # 11:30 AM SG Time
    - cron: '30 3 * * *'
    # 3:30 PM SG Time
    - cron: '30 7 * * *'
    # 5:30 PM SG Time
    - cron: '30 9 * * *'
  workflow_dispatch: 

jobs:
  update-google-sheet:
    runs-on: ubuntu-latest
    
    steps:
      - name: Check out repository
        uses: actions/checkout@v3
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r Tableau_GitHub_Action/requirements.txt
          
      - name: Run script
        env:
          TABLEAU_TOKEN_SECRET: ${{ secrets.TABLEAU_TOKEN }}
          GCP_CREDENTIALS_JSON: ${{ secrets.GCP_CREDENTIALS }}
        run: python Tableau_GitHub_Action/pull_tableau_data.py
